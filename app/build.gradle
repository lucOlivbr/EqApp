apply plugin: 'com.android.application'

android {
    namespace 'com.example.equalizer'
    compileSdk 33
    defaultConfig {
        applicationId "com.example.equalizer"
        minSdk 21
        targetSdk 33
        versionCode 1
        versionName "1.0"
    }
    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }
}

dependencies {
    implementation 'androidx.appcompat:appcompat:1.6.1'
}
